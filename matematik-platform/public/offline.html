<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Çevrimdışı — Uğur Hoca Matematik</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
      padding: 2rem;
      overflow: hidden;
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .orb-1 { width: 400px; height: 400px; background: #f97316; top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: #8b5cf6; bottom: -80px; left: -80px; }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .icon-ring {
      width: 100px;
      height: 100px;
      margin: 0 auto 2rem;
      background: linear-gradient(135deg, #f97316, #ef4444);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.75rem;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(249,115,22,0.3); }
      50%  { box-shadow: 0 0 0 20px rgba(249,115,22,0); }
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .brand-dot { width: 8px; height: 8px; background: #f97316; border-radius: 50%; }
    .brand-text { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; color: #f97316; text-transform: uppercase; }

    h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.75rem; }
    p  { color: #94a3b8; line-height: 1.7; margin-bottom: 2rem; font-size: 0.975rem; }

    .tip-box {
      background: rgba(249,115,22,0.1);
      border: 1px solid rgba(249,115,22,0.2);
      border-radius: 1rem;
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      font-size: 0.85rem;
      color: #fdba74;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #f97316, #ef4444);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 1rem;
      padding: 0.875rem 2rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(249,115,22,0.35); }
    .btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-text">Uğur Hoca Matematik</span>
      <div class="brand-dot"></div>
    </div>

    <div class="icon-ring">📡</div>

    <h1>Çevrimdışısın</h1>
    <p>Şu anda internet bağlantın yok. Bağlantı kurulduğunda platformumuza tekrar giriş yapabilirsin.</p>

    <div class="tip-box">
      💡 <strong>İpucu:</strong> Uygulamayı telefona kurduğunda, önceden yüklenen sayfalar çevrimdışında da çalışmaya devam eder!
    </div>

    <button class="btn" onclick="window.location.reload()">
      🔄 Tekrar Dene
    </button>
  </div>
</body>
</html>
